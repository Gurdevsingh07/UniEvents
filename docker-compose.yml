version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: uems-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: university_events
      MYSQL_USER: ${DB_USERNAME:-uems_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-uems_password}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - uems-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: uems-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_URL: jdbc:mysql://mysql:3306/university_events?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      DB_USERNAME: ${DB_USERNAME:-uems_user}
      DB_PASSWORD: ${DB_PASSWORD:-uems_password}
      JWT_SECRET: ${JWT_SECRET:-UniversityEventManagementSystemSecretKeyThatIsAtLeast256BitsLong2024!}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,http://localhost:80,http://localhost:3000}
    ports:
      - "8080:8080"
    networks:
      - uems-network

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-}
    container_name: uems-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    networks:
      - uems-network

volumes:
  mysql-data:

networks:
  uems-network:
    driver: bridge
