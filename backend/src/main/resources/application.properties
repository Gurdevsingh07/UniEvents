# Server
server.port=8080

# Database (H2 - file-based for persistence across restarts)
spring.datasource.url=${DB_URL:jdbc:h2:file:./data/university_events;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.h2.Driver

# H2 Console (accessible at http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
app.jwt.secret=${JWT_SECRET:UniversityEventManagementSystemSecretKeyThatIsAtLeast256BitsLong2024!}
app.jwt.expiration-ms=${JWT_EXPIRATION:86400000}

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# CORS
app.cors.allowed-origins=${CORS_ORIGINS:*}

# File upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging
logging.level.com.university=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG

# Error Handling
# Error Handling
server.error.include-message=always
server.error.include-stacktrace=always
server.error.include-binding-errors=always

# Face Recognition
app.face.match-threshold=0.65
