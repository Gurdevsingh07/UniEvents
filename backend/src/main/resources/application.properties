# =============================================
# UniEvents - Production Configuration
# =============================================

# Server
server.port=${PORT:8080}

# =============================================
# Database Configuration
# Render provides DATABASE_URL as a PostgreSQL connection string.
# For local dev, falls back to H2 file-based database.
# =============================================
spring.datasource.url=${DB_URL:jdbc:h2:file:./data/university_events;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}

# H2 Console (Dev only - disabled in production via env vars)
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:false}
spring.h2.console.path=/h2-console

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${HIBERNATE_DDL:update}
spring.jpa.show-sql=false
spring.jpa.database-platform=${JPA_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# =============================================
# JWT Security
# IMPORTANT: Override JWT_SECRET in Render env vars!
# =============================================
app.jwt.secret=${JWT_SECRET:UniversityEventManagementSystemSecretKeyThatIsAtLeast256BitsLong2024!}
app.jwt.expiration-ms=${JWT_EXPIRATION:86400000}

# =============================================
# CORS Policy
# =============================================
app.cors.allowed-origins=${CORS_ORIGINS:https://uni-events-swart.vercel.app}

# =============================================
# Swagger / API Documentation
# =============================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# =============================================
# File Upload Configuration
# =============================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# =============================================
# Actuator (Health Checks for Render)
# =============================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# =============================================
# Production Logging
# =============================================
logging.level.root=INFO
logging.level.com.university=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN

# =============================================
# Production Error Handling
# =============================================
server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-binding-errors=never

# =============================================
# Biometric Verification
# =============================================
app.face.match-threshold=0.65
